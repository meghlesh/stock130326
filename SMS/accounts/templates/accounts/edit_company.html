<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Company | {{ company.name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .active-nav { background-color: #4f46e5; color: white; }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 overflow-hidden">

<div class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0">
        <div class="p-6 border-b flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <i data-lucide="building-2" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="font-bold">{{ company.name }}</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Admin</p>
            </div>
        </div>

        <nav class="flex-1 p-4 space-y-2 custom-scrollbar">
            <a href="{% url 'admin_dashboard' %}" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-600 hover:bg-slate-100">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                Dashboard
            </a>

            <a href="{% url 'admin_dashboard' %}" class="active-nav flex items-center gap-3 px-4 py-3 rounded-lg font-semibold">
                <i data-lucide="pencil" class="w-5 h-5"></i>
                Edit Company
            </a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 flex flex-col overflow-hidden">

        <!-- HEADER -->
        <header class="h-16 bg-white border-b px-8 flex items-center justify-between">
            <h2 class="text-lg font-bold">Edit Company</h2>
            <div class="h-9 w-9 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold">
                {{ request.user.username|slice:":1"|upper }}
            </div>
        </header>

        <!-- CONTENT -->
        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">

            <div class="max-w-3xl mx-auto space-y-6">

                <!-- TITLE -->
                <div>
                    <h3 class="text-2xl font-bold">Company Details</h3>
                    <p class="text-sm text-slate-500">Update company information below.</p>
                </div>

                <!-- FORM CARD -->
                <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">

                    <form method="POST">
                        {% csrf_token %}

                        <div class="p-8 space-y-6">

                            <!-- COMPANY NAME -->
                            <div>
<label for="company_name" class="block text-sm font-semibold text-gray-700 mb-2">
    Company Name <span class="text-red-500">*</span>
</label>
<input
    type="text"
    name="company_name"
    id="company_name"
    required
    class="block w-full px-4 py-3 border rounded-xl"
/>
                            </div>

                            <!-- COMPANY EMAIL -->
                            <div>
<label for="company_email" class="block text-sm font-semibold text-gray-700 mb-2">
    Company Email <span class="text-red-500">*</span>
</label>
<input
    type="email"
    name="company_email"
    id="company_email"
    required
    class="block w-full px-4 py-3 border rounded-xl"
/>
                            </div>

                        </div>

                        <!-- FOOTER -->
                        <div class="p-6 bg-slate-50 border-t flex justify-end gap-3">
                            <a href="{% url 'admin_dashboard' %}"
                               class="px-6 py-2.5 rounded-xl bg-white border font-semibold hover:bg-slate-100">
                                Cancel
                            </a>

                            <button type="submit"
                                    class="px-10 py-2.5 rounded-xl bg-indigo-600 text-white font-bold
                                           hover:bg-indigo-700 shadow-lg shadow-indigo-100 flex items-center gap-2">
                                <i data-lucide="save" class="w-4 h-4"></i>
                                Update Company
                            </button>
                        </div>

                    </form>

                </div>

            </div>
        </div>
    </main>
</div>

<script>
    lucide.createIcons();
</script>

</body>
</html>
